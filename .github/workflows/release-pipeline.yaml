name: release-pipeline

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ github.ref_name }}

    steps:
    - name: Check out code
      uses: actions/checkout@v6

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Docker Setup Buildx
      id: buildx
      uses: docker/setup-buildx-action@v4
      with:
        platforms: linux/amd64,linux/arm64

    - name: Docker Login
      uses: docker/login-action@v4
      with:
        username: ${{ vars.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        file: ./Dockerfile
        context: .
        push: true
        tags: ${{ vars.DOCKER_USERNAME }}/valkey-operator:${{ env.RELEASE_VERSION }}
        platforms: linux/amd64,linux/arm64

  update-chart:
    name: Update Helm chart appVersion
    runs-on: ubuntu-latest
    needs: build
    env:
      RELEASE_VERSION: ${{ github.ref_name }}
    steps:
      - name: Determine release branch
        run: |
          MAJOR=$(echo "${RELEASE_VERSION#v}" | cut -d. -f1)
          MINOR=$(echo "${RELEASE_VERSION#v}" | cut -d. -f2)
          echo "RELEASE_BRANCH=release-${MAJOR}.${MINOR}" >> $GITHUB_ENV

      - name: Check out release branch
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_BRANCH }}
          token: ${{ secrets.GH_TOKEN }}

      - name: Update Chart.yaml appVersion
        run: |
          sed -i "s/^appVersion:.*/appVersion: \"${RELEASE_VERSION}\"/" charts/valkey-operator/Chart.yaml

      - name: Commit and push Chart.yaml update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/valkey-operator/Chart.yaml
          git diff --cached --quiet || git commit -m "chore: update Helm chart appVersion to ${RELEASE_VERSION} [skip ci]"
          git push origin ${RELEASE_BRANCH}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
