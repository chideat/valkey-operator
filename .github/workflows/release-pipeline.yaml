name: release-pipeline

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ github.ref_name }}

    steps:
    - name: Check out code
      uses: actions/checkout@v6

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Docker Setup Buildx
      id: buildx
      uses: docker/setup-buildx-action@v4
      with:
        platforms: linux/amd64,linux/arm64

    - name: Docker Login
      uses: docker/login-action@v4
      with:
        username: ${{ vars.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: GitHub Login
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GH_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        file: ./Dockerfile
        context: .
        push: true
        tags: |
          ${{ vars.DOCKER_USERNAME }}/valkey-operator:${{ env.RELEASE_VERSION }}
          ghcr.io/${{ github.repository_owner }}/valkey-operator:${{ env.RELEASE_VERSION }}
        platforms: linux/amd64,linux/arm64

  update-chart:
    name: Update Helm chart version
    runs-on: ubuntu-latest
    needs: build
    env:
      RELEASE_VERSION: ${{ github.ref_name }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GH_TOKEN }}

      - name: Update Chart.yaml appVersion and version
        run: |
          CHART_VERSION="${RELEASE_VERSION#v}"
          sed -i "s/^version:.*/version: ${CHART_VERSION}/" charts/valkey-operator/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${RELEASE_VERSION}\"/" charts/valkey-operator/Chart.yaml

      - name: Commit and push Chart.yaml update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/valkey-operator/Chart.yaml
          git diff --cached --quiet || git commit -m "chore: update Helm chart to ${RELEASE_VERSION}"
          git push origin main

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
