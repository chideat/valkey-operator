{{- if .Values.webhook.enabled }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "valkey-operator.fullname" . }}-mutating-webhook-configuration
  labels:
    {{- include "valkey-operator.labels" . | nindent 4 }}
  {{- if .Values.certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "valkey-operator.fullname" . }}-serving-cert
  {{- end }}
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "valkey-operator.webhookServiceName" . }}
      namespace: {{ .Release.Namespace }}
      path: /mutate-rds-valkey-buf-red-v1alpha1-valkey
  failurePolicy: Fail
  name: mvalkey-v1alpha1.kb.io
  rules:
  - apiGroups:
    - rds.valkey.buf.red
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - valkeys
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "valkey-operator.webhookServiceName" . }}
      namespace: {{ .Release.Namespace }}
      path: /mutate-valkey-buf-red-v1alpha1-user
  failurePolicy: Fail
  name: muser-v1alpha1.kb.io
  rules:
  - apiGroups:
    - valkey.buf.red
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    - DELETE
    resources:
    - users
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "valkey-operator.fullname" . }}-validating-webhook-configuration
  labels:
    {{- include "valkey-operator.labels" . | nindent 4 }}
  {{- if .Values.certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "valkey-operator.fullname" . }}-serving-cert
  {{- end }}
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "valkey-operator.webhookServiceName" . }}
      namespace: {{ .Release.Namespace }}
      path: /validate-rds-valkey-buf-red-v1alpha1-valkey
  failurePolicy: Fail
  name: vvalkey-v1alpha1.kb.io
  rules:
  - apiGroups:
    - rds.valkey.buf.red
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - valkeys
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "valkey-operator.webhookServiceName" . }}
      namespace: {{ .Release.Namespace }}
      path: /validate-valkey-buf-red-v1alpha1-cluster
  failurePolicy: Fail
  name: vcluster-v1alpha1.kb.io
  rules:
  - apiGroups:
    - valkey.buf.red
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    resources:
    - clusters
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "valkey-operator.webhookServiceName" . }}
      namespace: {{ .Release.Namespace }}
      path: /validate-valkey-buf-red-v1alpha1-failover
  failurePolicy: Fail
  name: vfailover-v1alpha1.kb.io
  rules:
  - apiGroups:
    - valkey.buf.red
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    resources:
    - failovers
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "valkey-operator.webhookServiceName" . }}
      namespace: {{ .Release.Namespace }}
      path: /validate-valkey-buf-red-v1alpha1-user
  failurePolicy: Fail
  name: vuser-v1alpha1.kb.io
  rules:
  - apiGroups:
    - valkey.buf.red
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - users
  sideEffects: None
{{- end }}
