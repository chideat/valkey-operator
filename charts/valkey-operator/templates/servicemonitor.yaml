{{- if and .Values.metrics.enabled .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "valkey-operator.fullname" . }}-metrics-monitor
  namespace: {{ .Release.Namespace }}
  labels:
    control-plane: controller-manager
    {{- include "valkey-operator.labels" . | nindent 4 }}
    {{- with .Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  endpoints:
  - path: /metrics
    port: https
    scheme: https
    interval: {{ .Values.serviceMonitor.interval }}
    scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
    bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
    tlsConfig:
      # insecureSkipVerify is set to true here to allow scraping metrics without a CA bundle.
      # For production environments, consider configuring caFile, certFile, and keyFile
      # for mutual TLS verification instead.
      insecureSkipVerify: true
  selector:
    matchLabels:
      control-plane: controller-manager
      {{- include "valkey-operator.selectorLabels" . | nindent 6 }}
{{- end }}
