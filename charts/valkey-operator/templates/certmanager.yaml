{{- if .Values.certManager.enabled }}
{{- if .Values.webhook.enabled }}
{{- /*
  Preflight check: verify that cert-manager CRDs are present in the cluster.
  If not, abort the install with a clear error message.
  This check can be disabled for offline rendering, such as CI or GitOps
  workflows using `helm template` without a live cluster connection.
*/}}
{{- if .Values.certManager.preflightCheck.enabled }}
{{- $certCRD := lookup "apiextensions.k8s.io/v1" "CustomResourceDefinition" "" "certificates.cert-manager.io" }}
{{- if not $certCRD }}
{{- fail "cert-manager is not installed in this cluster.\nInstall cert-manager first: https://cert-manager.io/docs/installation/\nOr disable the integration: --set certManager.enabled=false\nOr skip this preflight during offline rendering: --set certManager.preflightCheck.enabled=false" }}
{{- end }}
{{- end }}
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "valkey-operator.fullname" . }}-selfsigned-issuer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "valkey-operator.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "valkey-operator.fullname" . }}-serving-cert
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "valkey-operator.labels" . | nindent 4 }}
spec:
  dnsNames:
  - {{ include "valkey-operator.webhookServiceName" . }}.{{ .Release.Namespace }}.svc
  - {{ include "valkey-operator.webhookServiceName" . }}.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: {{ include "valkey-operator.fullname" . }}-selfsigned-issuer
  secretName: {{ include "valkey-operator.webhookCertSecret" . }}
{{- end }}
{{- end }}
